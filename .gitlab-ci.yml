stages:
  - build
  - deploy

variables:
  IMAGE_NAME: mirai
  CONTAINER_NAME: mirai

build:
  stage: build
  tags:
    - unraid
  script:
    - docker build -t $IMAGE_NAME .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  tags:
    - shell
  script:
    - docker stop $CONTAINER_NAME || true
    - docker rm $CONTAINER_NAME || true
    - docker run -d
      --name $CONTAINER_NAME
      --restart unless-stopped
      --network host
      -e HA_HOST=$HA_HOST
      -e HA_PORT=$HA_PORT
      -e HA_TOKEN=$HA_TOKEN
      -e MIRAI_LATITUDE=$MIRAI_LATITUDE
      -e MIRAI_LONGITUDE=$MIRAI_LONGITUDE
      -e MIRAI_TIMEZONE=$MIRAI_TIMEZONE
      -e MIRAI_AUTOMATIONS_PATH=/automations
      -e MIRAI_DATA_PATH=/app/data
      -v /mnt/user/appdata/mirai-automations/automations:/automations:ro
      -v mirai_data:/app/data
      $IMAGE_NAME
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
