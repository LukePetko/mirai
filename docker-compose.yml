services:
  mirai:
    build: .
    container_name: mirai
    restart: unless-stopped
    environment:
      - HA_HOST=${HA_HOST:-homeassistant.local}
      - HA_PORT=${HA_PORT:-8123}
      - HA_TOKEN=${HA_TOKEN}
      - MIRAI_LATITUDE=${MIRAI_LATITUDE}
      - MIRAI_LONGITUDE=${MIRAI_LONGITUDE}
      - MIRAI_TIMEZONE=${MIRAI_TIMEZONE:-Europe/Prague}
      - MIRAI_AUTOMATIONS_PATH=/automations
      - MIRAI_DATA_PATH=/app/data
    volumes:
      # Persist global state across restarts
      - mirai_data:/app/data
      # Mount automations from the mirai-automations repo
      - ../mirai-automations/automations:/automations:ro

volumes:
  mirai_data:
